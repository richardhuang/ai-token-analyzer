<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Usage Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><linearGradient id=%22grad%22 x1=%220%22 x2=%221%22 y1=%220%22 y2=%221%22><stop offset=%220%22 stop-color=%22%23667eea%22/><stop offset=%221%22 stop-color=%22%23764ba2%22/></linearGradient><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22url(%23grad)%22/><path d=%22M30 40h40M30 60h40M35 30v40M65 30v40M25 50h50%22 stroke=%22white%22 stroke-width=%228%22 stroke-linecap=%22round%22 fill=%22none%22/></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .usage-card {
            transition: transform 0.2s;
        }
        .usage-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand">AI Token Usage Dashboard</span>
            <span class="navbar-text">Last updated: <span id="last-updated">{{today}}</span></span>
        </div>
    </nav>

    <div class="container">
        <!-- Today's Usage Cards -->
        <h3 class="mb-4">Today's Usage (<span id="today-date">{{today}}</span>)</h3>
        <div class="row" id="today-cards">
            <div class="col-12 text-center text-muted">
                Loading data...
            </div>
        </div>

        <div class="row mt-4">
            <!-- Summary Cards -->
            <div class="col-md-4">
                <div class="card usage-card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Total Overview</h5>
                        <canvas id="totalChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card usage-card">
                    <div class="card-body">
                        <h5 class="card-title">Trend Chart (Last 30 Days)</h5>
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tools Info -->
        <div class="row mt-4" id="tools-info">
            <div class="col-12 text-center text-muted">
                Loading data...
            </div>
        </div>
    </div>

    <script>
        // Store summary data for reuse to avoid duplicate API calls
        let summaryDataForChart = null;

        // Color palette for each tool (consistent across all charts)
        const toolColors = {
            'openclaw': { border: 'rgba(255, 99, 132, 1)', background: 'rgba(255, 99, 132, 0.2)', card: 'bg-danger' },
            'claude': { border: 'rgba(75, 192, 192, 1)', background: 'rgba(75, 192, 192, 0.2)', card: 'bg-success' },
            'qwen': { border: 'rgba(54, 162, 235, 1)', background: 'rgba(54, 162, 235, 0.2)', card: 'bg-info' }
        };

        // Load today's usage
        async function loadToday() {
            const container = document.getElementById('today-cards');
            // Clear loading text first
            container.innerHTML = '';
            try {
                const response = await fetch('/api/today');
                const data = await response.json();

                if (data.length === 0) {
                    container.innerHTML = '<div class="col-12 text-center">No data available for today</div>';
                    return;
                }

                let html = '';
                data.forEach(item => {
                    const colors = toolColors[item.tool_name] || { card: 'bg-secondary' };

                    html += `
                        <div class="col-md-4">
                            <div class="card usage-card ${colors.card} text-white">
                                <div class="card-body">
                                    <h6 class="card-subtitle mb-2 text-white-50">${item.tool_name.toUpperCase()}</h6>
                                    <h3 class="card-title">${formatTokens(item.tokens_used)}</h3>
                                    <p class="card-text mb-1">Date: ${item.date}</p>
                                    ${item.request_count > 0 ? `<p class="card-text">Requests: ${item.request_count}</p>` : ''}
                                    ${item.input_tokens > 0 ? `<p class="card-text">Input: ${formatTokens(item.input_tokens)}</p>` : ''}
                                    ${item.output_tokens > 0 ? `<p class="card-text">Output: ${formatTokens(item.output_tokens)}</p>` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading today data:', error);
                container.innerHTML = '<div class="col-12 text-center text-danger">Error loading today data</div>';
            }
        }

        // Load Total Overview chart (pie chart)
        async function loadTotalChart() {
            // Clear loading text from tools-info if it exists
            const toolsContainer = document.getElementById('tools-info');
            if (toolsContainer && toolsContainer.querySelector('.text-muted')) {
                toolsContainer.innerHTML = '';
            }

            const container = document.getElementById('totalChart');
            try {
                // Use cached summary data if available
                if (summaryDataForChart === null) {
                    const response = await fetch('/api/summary');
                    summaryDataForChart = await response.json();
                }

                if (Object.keys(summaryDataForChart).length === 0) {
                    container.parentElement.innerHTML = '<p class="text-center text-muted">No data available</p>';
                    return;
                }

                const ctx = document.getElementById('totalChart').getContext('2d');

                const labels = Object.keys(summaryDataForChart);
                const dataValues = Object.values(summaryDataForChart).map(item => item.total_tokens);

                // Color palette for each tool
                const backgroundColors = labels.map(tool => {
                    return toolColors[tool].background;
                });
                const borderColors = labels.map(tool => {
                    return toolColors[tool].border;
                });

                new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: labels.map(tool => tool.toUpperCase()),
                        datasets: [{
                            label: 'Total Tokens',
                            data: dataValues,
                            backgroundColor: backgroundColors,
                            borderColor: borderColors,
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            title: { display: true, text: 'Total Token Usage by Tool', font: { size: 14 } },
                            legend: { position: 'bottom' },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        let label = context.label || '';
                                        if (label) {
                                            label += ': ';
                                        }
                                        if (context.parsed !== null) {
                                            label += formatTokens(context.parsed);
                                        }
                                        return label + ' tokens';
                                    },
                                    afterBody: function(context) {
                                        // Show request count if available in data
                                        const toolName = context[0].label.toLowerCase();
                                        const stats = summaryDataForChart[toolName];
                                        if (stats && stats.total_requests) {
                                            return 'Requests: ' + stats.total_requests;
                                        }
                                        return '';
                                    }
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Error loading total chart:', error);
                const container = document.getElementById('totalChart');
                container.parentElement.innerHTML = '<p class="text-center text-muted">No data available</p>';
            }
        }

        // Load summary data
        async function loadSummary() {
            const container = document.getElementById('tools-info');
            // Clear loading text first
            container.innerHTML = '';
            try {
                // Use cached summary data if available
                let data;
                if (summaryDataForChart === null) {
                    const response = await fetch('/api/summary');
                    data = await response.json();
                    summaryDataForChart = data;
                } else {
                    data = summaryDataForChart;
                }

                if (Object.keys(data).length === 0) {
                    container.innerHTML = '<div class="col-12 text-center">No data available</div>';
                    return;
                }

                let html = '';
                Object.entries(data).forEach(([tool, stats]) => {
                    const colors = toolColors[tool] || { card: 'bg-secondary' };

                    html += `
                        <div class="col-md-4">
                            <div class="card usage-card ${colors.card} text-white">
                                <div class="card-body">
                                    <h5 class="card-title">${tool.toUpperCase()}</h5>
                                    <p class="card-text">
                                        <strong>${formatTokens(stats.total_tokens)}</strong> total<br>
                                        ${stats.days_count} days tracked<br>
                                        Avg: ${formatTokens(stats.avg_tokens)}/day
                                        ${stats.total_requests ? `<br>Requests: ${stats.total_requests}${stats.avg_requests ? ' (avg ' + Math.round(stats.avg_requests) + '/day)' : ''}` : ''}
                                    </p>
                                    <small>Date range: ${stats.first_date} to ${stats.last_date}</small>
                                </div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading summary:', error);
                container.innerHTML = '<div class="col-12 text-center text-danger">Error loading summary data</div>';
            }
        }

        // Load trend chart
        async function loadTrendChart() {
            const container = document.getElementById('trendChart');
            // Clear loading text from tools-info if it exists (for total chart loading message)
            const toolsContainer = document.getElementById('tools-info');
            if (toolsContainer && toolsContainer.querySelector('.text-muted')) {
                toolsContainer.innerHTML = '';
            }
            try {
                const response = await fetch('/api/range?start=' + getDaysAgo(30) + '&end=' + getToday());
                const data = await response.json();

                if (data.length === 0) {
                    container.parentElement.innerHTML = '<p class="text-center text-muted">No data available</p>';
                    return;
                }

                const ctx = document.getElementById('trendChart').getContext('2d');

                // Group data by date
                const dates = [...new Set(data.map(d => d.date))].sort().slice(-14); // Last 14 days
                const tools = [...new Set(data.map(d => d.tool_name))];

                const datasets = tools.map(tool => ({
                    label: tool.toUpperCase(),
                    data: dates.map(date => {
                        const entry = data.find(d => d.date === date && d.tool_name === tool);
                        return entry ? entry.tokens_used : 0;
                    }),
                    tension: 0.4,
                    borderColor: toolColors[tool].border,
                    backgroundColor: toolColors[tool].background,
                    pointBackgroundColor: toolColors[tool].border,
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2
                }));

                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: dates,
                        datasets: datasets
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            title: { display: true, text: 'Token Usage Trend (Last 14 Days)' }
                        },
                        scales: {
                            y: {
                                suggestedMin: 0,
                                ticks: {
                                    callback: function(value) {
                                        return formatTokens(value);
                                    }
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Error loading trend chart:', error);
                const container = document.getElementById('trendChart');
                container.parentElement.innerHTML = '<p class="text-center text-muted">No data available</p>';
            }
        }

        // Helper functions
        function formatTokens(tokens) {
            if (tokens >= 1_000_000_000) {
                return (tokens / 1_000_000_000).toFixed(2) + 'B';
            } else if (tokens >= 1_000_000) {
                return (tokens / 1_000_000).toFixed(2) + 'M';
            } else if (tokens >= 1_000) {
                return (tokens / 1_000).toFixed(2) + 'K';
            }
            return tokens.toString();
        }

        function getToday() {
            const d = new Date();
            return d.toISOString().split('T')[0];
        }

        function getDaysAgo(days) {
            const d = new Date();
            d.setDate(d.getDate() - days);
            return d.toISOString().split('T')[0];
        }

        // Load data on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadToday();
            loadTotalChart();
            loadSummary();
            loadTrendChart();
        });
    </script>
</body>
</html>
